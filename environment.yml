name: neuro-ai-brain-cell-atlas
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  # Core analysis (notebook 01)
  - scanpy>=1.10
  - pandas>=2.0
  - numpy>=1.24
  - matplotlib>=3.7
  - scikit-learn>=1.3
  - python-igraph>=0.10.4
  - leidenalg>=0.10
  - scvi-tools>=0.20.0
  - shap>=0.45.0
  - seaborn>=0.13.2
  # Notebooks
  - jupyter
  - ipykernel
  # Planned: spatial omics
  - squidpy>=1.4
  # Allen Brain Cell Atlas downloads
  - pip
  - pip:
      - gseapy>=1.2.1
      - liana>=1.0
      - "setuptools>=70,<81"
      - git+https://github.com/AllenInstitute/abc_atlas_access.git
