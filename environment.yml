name: neuro-ai-brain-cell-atlas
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  # Core analysis (notebook 01)
  - scanpy>=1.10
  - pandas>=2.0
  - numpy>=1.24
  - matplotlib>=3.7
  - scikit-learn>=1.3
