name: Deploy Platform

on:
  push:
    branches: [main]
    paths:
      - "platform/**"
      - ".github/workflows/deploy-platform.yml"
  workflow_dispatch:

concurrency:
  group: deploy-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Backend → Hugging Face Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Hugging Face config
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Add secret HF_TOKEN (Hugging Face write token)"
            exit 1
          fi
          if [ -z "$HF_SPACE_ID" ]; then
            echo "::error::Add repository variable HF_SPACE_ID (e.g. your-username/neurovision-neuro-api)"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install --upgrade huggingface_hub

      - name: Stage backend files
        run: |
          rsync -a \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache' \
            platform/backend/ /tmp/hf-space/
          ls -la /tmp/hf-space/

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          huggingface-cli upload "$HF_SPACE_ID" /tmp/hf-space \
            --repo-type space \
            --commit-message "Deploy backend ${GITHUB_SHA::7} from GitHub Actions"

      - name: Summary
        env:
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          SLUG=$(echo "$HF_SPACE_ID" | tr '/' '-')
          echo "### Backend deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Space: \`$HF_SPACE_ID\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Health: https://${SLUG}.hf.space/api/health" >> "$GITHUB_STEP_SUMMARY"

  deploy-frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID VITE_API_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing secret $name — see platform/DEPLOY.md"
              exit 1
            fi
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        id: vercel
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: platform/frontend
          vercel-args: "--prod"
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Summary
        run: |
          echo "### Frontend deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.vercel.outputs.preview-url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: \`${{ secrets.VITE_API_URL }}\`" >> "$GITHUB_STEP_SUMMARY"
